version = 1

[provenance]
signer_workflow = "jmgilman/poe/.github/workflows/release.yml"

[[packages]]
name = "poe2-mcp"
description = "Path of Exile 2 MCP server: an AI gateway to the PoE marketplace."
tag_pattern = "v${version}"

[[packages.assets]]
os = "darwin"
arch = "amd64"
pattern = "poe2-mcp_${version}_darwin_amd64"

[[packages.assets]]
os = "darwin"
arch = "arm64"
pattern = "poe2-mcp_${version}_darwin_arm64"

[[packages.assets]]
os = "linux"
arch = "amd64"
pattern = "poe2-mcp_${version}_linux_amd64"

[[packages.assets]]
os = "linux"
arch = "arm64"
pattern = "poe2-mcp_${version}_linux_arm64"

[[packages.binaries]]
path = "poe2-mcp"
