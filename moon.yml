language: 'go'
layer: 'application'
stack: 'backend'

project:
  title: 'poe2-mcp'
  description: 'Path of Exile 2 MCP server.'
  owner: 'jmgilman'
  maintainers:
    - 'jmgilman'

toolchains:
  default: 'go'

fileGroups:
  goSources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
    - 'go.mod'
    - 'go.sum'
  lintConfig:
    - '.golangci.yml'
    - '.prototools'
    - '.moon/proto/golangci-lint.toml'
  releaseConfig:
    - '.goreleaser.yaml'
    - 'ghd.toml'
    - 'release-please-config.json'
    - '.release-please-manifest.json'
    - '.github/workflows/**/*.yml'

workspace:
  inheritedTasks:
    include: []

tasks:
  format:
    command: 'proto run golangci-lint -- fmt --config .golangci.yml --diff'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false
      mutex: 'golangci-lint'

  # format checks (--diff, used by `check`/CI); format-fix applies the changes.
  format-fix:
    command: 'proto run golangci-lint -- fmt --config .golangci.yml'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false
      mutex: 'golangci-lint'

  lint:
    command: 'proto run golangci-lint -- run --config .golangci.yml ./... --show-stats=false'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false
      mutex: 'golangci-lint'

  build:
    command: 'go build -o bin/poe2-mcp ./cmd/poe2-mcp'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
    outputs:
      - 'bin/poe2-mcp'

  test:
    command: 'go test -race -coverprofile=coverage.out ./...'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
    options:
      cache: false

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:test'
      - 'docs:build'
      - 'proxy:check'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
      - '@group(releaseConfig)'
    options:
      cache: false
      runInCI: true
